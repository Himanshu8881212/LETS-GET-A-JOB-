services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: headhunter-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LLM_PROVIDER=${LLM_PROVIDER:-openai-compatible}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
