<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Smoke Test — Application Form</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 620px; margin: 40px auto; padding: 0 20px; }
  .field { display: block; margin: 14px 0; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  input[type=text], input[type=email], input[type=tel], input[type=url], select, textarea {
    width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
  }
  textarea { min-height: 90px; font-family: inherit; }
  .help { font-size: 12px; color: #666; margin-top: 4px; }
  button { padding: 10px 16px; font-size: 14px; border-radius: 6px; border: 1px solid #333; background: #222; color: white; cursor: pointer; }
</style>
</head>
<body>
  <h1>Senior Backend Engineer — Application</h1>

  <form id="f" onsubmit="return false">
    <div class="field">
      <label for="firstName">First Name</label>
      <input id="firstName" name="firstName" type="text" required>
    </div>
    <div class="field">
      <label for="lastName">Last Name</label>
      <input id="lastName" name="lastName" type="text" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required>
    </div>
    <div class="field">
      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel">
    </div>
    <div class="field">
      <label for="linkedin">LinkedIn URL</label>
      <input id="linkedin" name="linkedin" type="url">
    </div>
    <div class="field">
      <label for="location">Current Location</label>
      <input id="location" name="location" type="text">
    </div>
    <div class="field">
      <label for="workAuth">Are you authorized to work in the EU?</label>
      <select id="workAuth" name="workAuth">
        <option value="">Select…</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
        <option value="Need sponsorship">Need sponsorship</option>
      </select>
    </div>
    <div class="field">
      <label for="motivation">Why this role? What excites you about joining us?</label>
      <textarea id="motivation" name="motivation" maxlength="800" required></textarea>
      <div class="help">Max 800 characters.</div>
    </div>
    <div class="field">
      <label for="impact">Describe a specific project where you owned a backend system end-to-end.</label>
      <textarea id="impact" name="impact" maxlength="1200" required></textarea>
      <div class="help">Max 1200 characters.</div>
    </div>
    <div class="field">
      <label for="gender">Gender (optional)</label>
      <select id="gender" name="gender">
        <option value="">Prefer not to say</option>
        <option value="female">Female</option>
        <option value="male">Male</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="field">
      <label><input type="checkbox" id="gdpr" name="gdpr"> I consent to my data being processed.</label>
    </div>
    <button id="submit" type="submit">Submit Application</button>
  </form>
</body>
</html>
